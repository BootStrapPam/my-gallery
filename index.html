<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .item img {
            width: 200px;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">

    <div class="item">
        <h3>Image 1</h3>
        <img src="images/image1.png" alt="Image 1">
    </div>

    <div class="item">
        <h3>Image 2</h3>
        <img src="images/image2.png" alt="Image 2">
    </div>

</div>

</body>
</html>
